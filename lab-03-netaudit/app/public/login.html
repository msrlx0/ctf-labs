<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - NetAudit</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="container">
    <section class="card narrow">
      <p class="eyebrow">NetAudit</p>
      <h1>Login</h1>
      <p class="muted">Acesso de analista para o painel de monitoramento.</p>

      <div class="hint-box">
        <span>Credencial de laboratorio</span>
        <code>analyst:analyst123</code>
      </div>

      <label for="username">Usuario</label>
      <input id="username" autocomplete="off">

      <label for="password">Senha</label>
      <input id="password" autocomplete="off" type="password">

      <button data-action="login">Entrar</button>

      <pre id="result" class="compact-output"></pre>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
