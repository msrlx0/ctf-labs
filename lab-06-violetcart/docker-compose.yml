services:
  web:
    build: .
    ports:
      - "8098:80"
    environment:
      DB_HOST: db
      DB_NAME: violetcart
      DB_USER: violet
      DB_PASS: violetpass
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: violetcart
      MYSQL_USER: violet
      MYSQL_PASSWORD: violetpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20
