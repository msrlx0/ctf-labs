services:
  obsidianpay-api:
    build: ./api
    container_name: lab08-obsidianpay-api
    ports:
      - "127.0.0.1:8102:8102"
    environment:
      - NODE_ENV=development
      - PORT=8102
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://127.0.0.1:8102/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
